name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python files
        run: python -m py_compile app.py main.py slide_image.py

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [syntax]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t book-to-notion:ci .
