services:
  - type: web
    name: book-to-notion
    runtime: docker
    plan: free
    region: oregon          # Gemini API が Singapore IP を弾くため US 西海岸を明示
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Renderダッシュボードで手動設定
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: PORT
        value: 10000         # Renderが使うデフォルトポート
    # 無料プランは Persistent Disk 非対応のため /photos はコンテナ一時 FS。
    # 再起動・スリープ復帰で中身は消える。アップロード→EXECUTE→CLEAR の運用前提のため許容。
    # 永続化が必要なら Starter プラン以上に上げて disk: ブロックを復活させる。
